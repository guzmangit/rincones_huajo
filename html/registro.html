<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Rincones de Huajolotitlán</title>
    <!-- Ruta corregida para encontrar el CSS afuera -->
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <header>
        <h1>Únete a nuestra Comunidad</h1>
        <h3>Registra tu visita a la Mixteca</h3>
    </header>

    <nav class="menu">
        <!-- Ruta corregida para volver al index que está afuera -->
        <a href="../index.html">Inicio</a>
        <!-- Estos se quedan igual porque están en la misma carpeta 'html' -->
        <a href="historia.html">Historia</a>
        <a href="lugares.html">Lugares</a>
        <a href="registro.html">Registrarse</a>
    </nav>

    <main class="contenedor-formulario">
        <h2>Formulario de Registro</h2>
        <form class="formulario">
            <div class="campo">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>
            
            <div class="campo">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>
            
            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos algo sobre tu visita"></textarea>
            </div>
            
            <button type="submit" class="boton-enviar">Enviar Registro</button>
        </form>
    </main>

    <footer>
        <p>Rincones de Huajolotitlán Creador Ricardo Cruz Guzman 607</p>
    </footer>

</body>
</html>
