<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Rincones de Huajolotitlán</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <header>
        <h1>Únete a nuestra Comunidad</h1>
        <h3>Registra tu visita a la Mixteca</h3>
    </header>

    <nav class="menu">
        <a href="../index.html">Inicio</a>
        <a href="historia.html">Historia</a>
        <a href="lugares.html">Lugares</a>
        <a href="registro.html">Registrarse</a>
    </nav>

    <main class="contenedor-formulario">
        <h2>Formulario de Registro</h2>
        <form class="formulario" id="miFormulario">
            <div class="campo">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>
            
            <div class="campo">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>
            
            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos algo sobre tu visita"></textarea>
            </div>
            
            <button type="submit" class="boton-enviar">Enviar Registro</button>
        </form>
    </main>

    <footer>
        <p>Rincones de Huajolotitlán Creador Ricardo Cruz Guzman 607</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://obymtbggkudzikkrsxdf.supabase.co";
        // Recuerda cambiar este texto de abajo por tu clave anon public larga
        const SUPABASE_ANON_KEY = "TU_LLAVE_ANON_PUBLIC_AQUÍ"; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('miFormulario').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const mensaje = document.getElementById('mensaje').value;

            const { data, error } = await _supabase
                .from('usuarios')
                .insert([{ nombre, email, mensaje }]);

            if (error) {
                alert('Hubo un error al guardar: ' + error.message);
            } else {
                alert('¡Datos guardados con éxito en la nube de Supabase!');
                document.getElementById('miFormulario').reset(); 
            }
        });
    </script>

</body>
</html>
